<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Document</title>
  </head>
  <body>
    <header class="header">
      <div class="header_links">
        <a href="./index.html" class="logo"
          ><img src="./assets/svg/meetup.svg" alt="logo"
        /></a>
        <form class="header_search">
          <input class="input-first" type="text" placeholder=" Search events" />
          <input
            class="input-second"
            type="text"
            placeholder="Mountain View, CA"
          />
          <button type="submit">
            <img src="./assets/svg/loop1.svg" alt="" />
          </button>
        </form>
      </div>

      <div class="header_actions">
        <div class="header_actions-language">
          <img src="./assets/svg/planet.svg" alt="planet" />
          <a href="#"><span>English</span></a>
        </div>

        <a href="#"><span class="login">Log in</span></a>
        <a class="primary-btn" href="#"><span>Sign up</span></a>
      </div>
    </header>

    <main>
      <section class="about container">
        <div class="about-links">
          <h1>The people platform—Where interests become friendships</h1>
          <p>
            Whatever your interest, from hiking and reading to networking and
            skill sharing, there are thousands of people who share it on Meetup.
            Events are happening every day—sign up to join the fun.
          </p>
          <a class="primary-btn" href="./index2.html">Join Meetup</a>
        </div>

        <div class="about-rights">
          <img src="./assets/svg/irl_event.svg" alt="" />
        </div>
      </section>

      <section class="events-section container">
        <div class="events__header">
          <div class="events__group">
            <h2 class="events__title">Events near</h2>
            <input
              class="events__search"
              type="text"
              placeholder="Mountain View, CA"
            />
          </div>
          <button class="events_see-all"><span>See all events</span></button>
        </div>
      </section>
      \

      <section class="categories"></section>
    </main>
    <footer class="footer"></footer>

    <script src="./js/index.js"></script>
  </body>
</html>
